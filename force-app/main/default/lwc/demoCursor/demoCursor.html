<template>
  <lightning-card title="Accounts">
    <template lwc:if={isLoading}>
      <div class="slds-is-relative slds-p-around_medium">
        <lightning-spinner
          alternative-text="Loading accounts"
          size="small"
        ></lightning-spinner>
      </div>
    </template>

    <template lwc:elseif={hasError}>
      <div class="slds-p-around_medium">
        <div class="slds-text-color_error" role="alert">{errorMessage}</div>
      </div>
    </template>

    <template lwc:elseif={isEmpty}>
      <div class="slds-p-around_medium">
        <p class="slds-text-body_regular">{emptyMessage}</p>
      </div>
    </template>

    <template lwc:else>
      <div class="slds-p-horizontal_medium slds-p-bottom_medium">
        <lightning-datatable
          key-field="id"
          data={accounts}
          columns={columns}
          hide-checkbox-column
        ></lightning-datatable>
      </div>
    </template>
  </lightning-card>
</template>
